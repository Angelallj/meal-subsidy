<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐补存入助手</title>
    <style>
        /* 页面整体：奶油底色，舒适柔和 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            background-color: #FDFBF7; 
            color: #5D534A; 
        }

        h2 { font-weight: 600; margin-bottom: 30px; }

        /* 按钮基础样式：统一圆角和间距 */
        button { 
            width: 100%; 
            padding: 18px; 
            margin: 12px 0; 
            border-radius: 16px; 
            border: none; 
            color: white; 
            font-size: 18px; 
            font-weight: 500;
            transition: transform 0.1s, opacity 0.2s;
            cursor: pointer;
        }

        /* 按钮按下反馈 */
        button:active { transform: scale(0.97); opacity: 0.9; }

        /* 温暖色系：核心存钱按钮 */
        .btn-primary { background-color: #E6A57E; }
        
        /* 辅助色系：吃饭按钮（更柔和的浅陶色） */
        .btn-secondary { background-color: #D9C5B2; }
        
        /* 警告/操作色系：去存钱按钮（更有活力的橘色） */
        .btn-accent { background-color: #F4A460; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="step1">
        <h2>今天晚上吃晚饭吗？</h2>
        <button class="btn-secondary" onclick="alert('好的，吃得开心！')">吃饭，不存钱</button>
        <button class="btn-accent" onclick="document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='block';">不吃了，去存钱</button>
    </div>

    <div id="step2" class="hidden">
        <h2>请选择店铺</h2>
        <button class="btn-primary" onclick="window.location.href='https://ur.alipay.com/_4lB26cCf4e5rbQAjIGjGOp'">蜀里</button>
        <button class="btn-primary" onclick="window.location.href='https://ur.alipay.com/_68fUKlMK9EyQjLYEq7LCNt'">马六七</button>
        <button class="btn-primary" onclick="window.location.href='https://ur.alipay.com/_4lB26cCf4e5rbQAjIGjGOp'">杨国福</button>
    </div>
</body>
</html>
