<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐补存入助手</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; background: #1677ff; color: white; font-size: 18px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="step1">
        <h2>今天晚上吃晚饭吗？</h2>
        <button onclick="alert('好的，记住了！')">吃饭（不存钱）</button>
        <button onclick="document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='block';" style="background: #ff4d4f;">不吃了，去存钱</button>
    </div>
    <div id="step2" class="hidden">
        <h2>请选择店铺</h2>
        <button onclick="window.location.href='https://ur.alipay.com/_4lB26cCf4e5rbQAjIGjGOp'">蜀里</button>
        <button onclick="window.location.href='https://ur.alipay.com/_68fUKlMK9EyQjLYEq7LCNt'">马六七</button>
    </div>
</body>
</html>
