name: 存餐补每日提醒

on:
  schedule:
    # 北京时间 17:30，工作日（UTC 09:30，周一到周五）
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 发送钉钉存餐补提醒
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_MEAL_SUBSIDY_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_MEAL_SUBSIDY_SECRET }}
        run: |
          TIMESTAMP=$(date +%s)000
          STRING_TO_SIGN="${TIMESTAMP}
          ${DINGTALK_SECRET}"
          SIGN=$(printf '%s' "$STRING_TO_SIGN" | openssl dgst -sha256 -hmac "$DINGTALK_SECRET" -binary | base64)
          URL_ENCODED_SIGN=$(printf '%s' "$SIGN" | sed 's/+/%2B/g; s/\//%2F/g; s/=/%3D/g')
          URL="${DINGTALK_WEBHOOK}&timestamp=${TIMESTAMP}&sign=${URL_ENCODED_SIGN}"

          MESSAGE="一天辛苦啦，如果不吃饭的话可以存进来哦~ https://angelallj.github.io/meal-subsidy/"

          RESPONSE=$(curl -s "$URL" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data-binary "{\"msgtype\":\"text\",\"text\":{\"content\":\"${MESSAGE}\"}}")

          echo "DingTalk response: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"errcode":0'; then
            echo "发送成功"
          else
            echo "发送失败"
            exit 1
          fi
